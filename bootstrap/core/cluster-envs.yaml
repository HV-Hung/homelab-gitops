apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-envs
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: dev
          - env: prod
  template:
    metadata:
      name: 'env-{{.env}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: infra
      source:
        repoURL: https://github.com/HV-Hung/homelab-gitops
        targetRevision: main
        path: infra/env-base
        helm:
          valueFiles:
            - values.yaml
            - values-{{.env}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
