apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: infra
  sources:
    - repoURL: https://github.com/HV-Hung/homelab-gitops
      targetRevision: main
      ref: values
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: "18.5.24"
      helm:
        valueFiles:
          - $values/infra/databases/postgresql/values.yaml
    - repoURL: https://github.com/HV-Hung/homelab-gitops
      targetRevision: main
      path: infra/databases/postgresql/extra-manifests
  
  destination:
    server: https://kubernetes.default.svc
    namespace: databases
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
