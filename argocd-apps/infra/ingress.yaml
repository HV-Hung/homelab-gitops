apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "4.15.0"
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/HV-Hung/homelab-gitops/main/infra/ingress/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress
  syncPolicy: {}
