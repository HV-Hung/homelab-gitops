replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  host: ""

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  cpuUtilization: 60
  memoryUtilization: 70

configmap:
  enabled: false
  data: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 2000

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

topologySpreadConstraints:
  enabled: false
  constraints: []

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

probes:
  liveness:
    enabled: true
    path: /healthz/live
    port: 8080
  readiness:
    enabled: true
    path: /healthz/ready
    port: 8080
