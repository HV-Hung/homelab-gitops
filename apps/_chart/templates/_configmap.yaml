{{- define "app.configmap" -}}
{{- if .Values.configmap }}
{{- if .Values.configmap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
{{- if .Values.configmap.data }}
data:
  {{- toYaml .Values.configmap.data | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
{{- end -}}
