## ============================================================
## Bitnami PostgreSQL Helm Values
## 1 replica | default PV | dev+prod DBs | 3 existing secrets
## ============================================================

architecture: standalone  # single replica (no replication)

auth:
  # Use the existing admin secret for the postgres superuser
  existingSecret: admin-db-secret
  secretKeys:
    adminPasswordKey: DB_PASSWORD # key inside psql-admin-secret

  # Bitnami only natively manages ONE user via auth.username/password.
  # We skip it here and create both users manually in initdb scripts below.
  username: ""
  database: ""

primary:
  # ── Replica count ─────────────────────────────────────────
  replicaCount: 1

  # ── Init scripts: create dev + prod databases and users ───
  initdb:
    user: postgres
    scripts:
      01_init_databases.sh: |
        #!/bin/bash
        set -e
        psql -v ON_ERROR_STOP=1 --username postgres <<-EOSQL
          CREATE USER dev_user WITH PASSWORD '${DEV_PASSWORD}';
          CREATE DATABASE dev OWNER dev_user;
          GRANT ALL PRIVILEGES ON DATABASE dev TO dev_user;

          CREATE USER prod_user WITH PASSWORD '${PROD_PASSWORD}';
          CREATE DATABASE prod OWNER prod_user;
          GRANT ALL PRIVILEGES ON DATABASE prod TO prod_user;
        EOSQL


  # ── Inject dev + prod passwords from existing secrets ─────
  # These become available as psql variables via PGOPTIONS or
  # as shell env vars used in the .sh init script alternative.
  extraEnvVars:
    - name: DEV_PASSWORD
      valueFrom:
        secretKeyRef:
          name: dev-db-secret
          key: DB_PASSWORD
    - name: PROD_PASSWORD
      valueFrom:
        secretKeyRef:
          name: prod-db-secret
          key: DB_PASSWORD

  # ── Persistence: use default StorageClass (default PV) ────
  persistence:
    enabled: true
    # storageClass: ""    # empty = cluster default StorageClass
    accessModes:
      - ReadWriteOnce
    size: 8Gi

  # ── Resources (adjust to your cluster) ────────────────────
  resourcesPreset: "small"   # none | nano | micro | small | medium | large

  # ── Service ───────────────────────────────────────────────
  service:
    type: ClusterIP
    ports:
      postgresql: 5432